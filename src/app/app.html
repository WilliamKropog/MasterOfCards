<header class="app-header">
  <div class="app-header-top">
    <h1 class="app-title">{{ title() }}</h1>
    <div class="app-header-stats">
      <p class="app-turn-counter">
        <span class="app-stat-label">Turn Counter:</span>
        <span class="app-stat-value">{{ engine.turnCounter() }}</span>
      </p>
      <p class="app-current-turn">
        <span class="app-stat-label">Current Turn:</span>
        <span class="app-stat-value">{{ engine.currentTurnDisplay() }}</span>
      </p>
    </div>
  </div>
  <button matButton="filled" type="button" (click)="engine.startGame()">Start</button>
</header>

<section class="battle-layout" aria-label="Game table">
  <div class="player-hand-row">
    <app-player-hand playerSlot="player1" [cardIds]="starterHand" />
  </div>

  <div class="play-field-area">
    <app-play-field />
  </div>

  <div class="player-hand-row">
    <app-player-hand playerSlot="player2" [cardIds]="starterHand" />
  </div>
</section>
