<header class="app-header">
  <div class="app-header-top">
    <h1 class="app-title">{{ title() }}</h1>
    <p class="app-turn-counter">
      <span class="app-turn-counter-label">Turn Counter:</span>
      <span class="app-turn-counter-value">{{ engine.turnCounter() }}</span>
    </p>
  </div>
  <button matButton="filled" type="button">Start</button>
</header>

<section class="battle-layout" aria-label="Game table">
  <div class="player-hand-row">
    <app-player-hand playerSlot="player1" [cardIds]="starterHand" />
  </div>

  <div class="play-field-area">
    <app-play-field />
  </div>

  <div class="player-hand-row">
    <app-player-hand playerSlot="player2" [cardIds]="starterHand" />
  </div>
</section>
