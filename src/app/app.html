<header class="app-header">
  <div class="app-header-top">
    <div class="app-header-left">
      <h1 class="app-title">{{ title() }}</h1>
      <div class="app-header-stats">
        <p class="app-turn-counter">
          <span class="app-stat-label">Turn Counter:</span>
          <span class="app-stat-value">{{ engine.turnCounter() }}</span>
        </p>
        <p class="app-current-turn">
          <span class="app-stat-label">Current Turn:</span>
          <span class="app-stat-value">{{ engine.currentTurnDisplay() }}</span>
        </p>
      </div>
    </div>
    <div class="app-header-actions">
      <button
        matButton="filled"
        type="button"
        [attr.aria-label]="engine.gameStarted() ? 'End game and reset board' : 'Start game'"
        (click)="onStartOrEndClick()"
      >
        {{ engine.gameStarted() ? 'End Game' : 'Start Game' }}
      </button>
      <button
        matButton="filled"
        type="button"
        [disabled]="!engine.canAdvanceTurn()"
        [attr.aria-label]="
          engine.canAdvanceTurn()
            ? 'End turn and pass to the other player'
            : 'Place a land or monster on the field to end your turn (not required if your hand has no land or monster cards)'
        "
        (click)="onNextTurnClick()"
      >
        Next Turn
      </button>
    </div>
  </div>
</header>

<section class="battle-layout" cdkDropListGroup aria-label="Game table">
  <div class="player-hand-row">
    <app-player-deck playerSlot="player1" />
    <app-player-hand playerSlot="player1" [cardIds]="engine.player1Hand()" />
  </div>

  <div class="play-field-area">
    <app-play-field />
  </div>

  <div class="player-hand-row">
    <app-player-deck playerSlot="player2" />
    <app-player-hand playerSlot="player2" [cardIds]="engine.player2Hand()" />
  </div>
</section>
