<section
  cdkDropList
  class="field-row"
  [class.field-row--drop-target]="showDropHighlight()"
  [cdkDropListData]="fieldCards()"
  [cdkDropListEnterPredicate]="canEnterRow"
  (cdkDropListDropped)="onDropped($event)"
  [attr.aria-label]="rowLabel()"
>
  @if (fieldCards().length === 0) {
    <span class="field-row-placeholder">{{ rowLabel() }}</span>
  } @else {
    <div class="field-row-cards">
      @for (cardId of fieldCards(); track $index) {
        <div class="field-row-card-slot">
          <app-card [cardId]="cardId" [ownerPlayerSlot]="playerSlot()" [onField]="true" />
        </div>
      }
    </div>
  }
</section>
